<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Office Infiltration: Heavy Arsenal</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Consolas', 'Courier New', monospace; overflow: hidden; }
        canvas { border: 5px solid #222; background: #0a0a0a; cursor: crosshair; box-shadow: 0 0 100px rgba(0,255,100,0.1); }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .bar-container { width: 500px; height: 30px; background: #222; border: 3px solid #444; margin-bottom: 10px; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #hpBar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #440000); transition: width 0.2s ease-out; }
        #stats { font-size: 32px; font-weight: bold; text-shadow: 4px 4px #000; display: flex; gap: 50px; }
        #ammoUI { color: #00ffff; font-size: 24px; font-weight: bold; margin-top: 10px; text-shadow: 2px 2px #000; }
        #weaponName { color: #ffd700; font-size: 18px; margin-top: 5px; }
        #shopMenu, #pauseMenu { position: absolute; display: none; background: rgba(5, 5, 15, 0.95); border: 4px solid #ffd700; padding: 50px; text-align: center; pointer-events: auto; width: 450px; box-shadow: 0 0 100px rgba(255, 215, 0, 0.3); z-index: 100; }
        h2 { font-size: 36px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; }
        button { background: #111; color: white; border: 2px solid #ffd700; padding: 20px; margin: 15px 0; cursor: pointer; width: 100%; font-weight: bold; font-size: 18px; transition: 0.3s; }
        button:hover:not(:disabled) { background: #ffd700; color: black; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="bar-container"><div id="hpBar"></div></div>
        <div id="stats">
            <span id="distVal">0m</span>
            <span id="cashVal" style="color: #ffd700;">$0</span>
        </div>
        <div id="ammoUI">AMMO: 20 / 20</div>
        <div id="weaponName">EQUIPPED: PISTOL</div>
    </div>

    <div id="shopMenu">
        <h2 style="color:#ffd700;">BLACK MARKET</h2>
        <button onclick="buyHealth()">REPAIR KIT +50 HP ($100)</button>
        <button id="upgradeBtn" onclick="buyMaxHealth()">ARMOR PLATE +25 MAX HP ($250)</button>
        <button id="weaponBuyBtn" onclick="buyWeapon()">BUY WEAPON ($750)</button>
        <button onclick="closeShop()">EXIT [ESC]</button>
    </div>

    <div id="pauseMenu">
        <h2 style="color:#fff;">PAUSED</h2>
        <button onclick="togglePause()">RESUME [P]</button>
        <button onclick="location.reload()">REBOOT SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
/**
 * KONFIGURACJA BRONI
 */
const WEAPONS = {
    pistol: { name: "PISTOL", damage: 20, count: 1, spread: 0, fireRate: 250, ammo: 20, reloadTime: 1000, type: 'bullet' },
    shotgun: { name: "SHOTGUN", damage: 10, count: 10, spread: 0.4, fireRate: 700, ammo: 6, reloadTime: 1000, type: 'bullet' },
    rifle: { name: "RIFLE", damage: 20, count: 1, spread: 0.05, fireRate: 100, ammo: 40, reloadTime: 1000, type: 'bullet' },
    launcher: { name: "GRENADE LAUNCHER", damage: 150, count: 1, spread: 0, fireRate: 2000, ammo: Infinity, reloadTime: 0, type: 'grenade' }
};

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpBar = document.getElementById("hpBar");
const shopMenu = document.getElementById("shopMenu");
const upgradeBtn = document.getElementById("upgradeBtn");
const weaponBuyBtn = document.getElementById("weaponBuyBtn");
const pauseMenu = document.getElementById("pauseMenu");

canvas.width = 1100;
canvas.height = 650;

const gravity = 0.95;
const friction = 0.85;

let keys = {};
let bullets = [], enemyBullets = [], explosions = [], coins = [], shops = [], platforms = [], enemies = [];
let cameraX = 0, distance = 0, money = 0, lastGeneratedX = 1200, activeShop = null, isPaused = false;
let inSecretRoom = false, savedX = 0, savedY = 0, isReloading = false;
let lastShotTime = 0;

let currentWeapon = WEAPONS.pistol;
let currentAmmo = 20;

const secretPlatforms = [
    { x: 100000, y: 600, w: 2000, h: 100, type: 'floor' },
    { x: 100200, y: 450, w: 200, h: 20, type: 'desk' },
    { x: 100600, y: 450, w: 200, h: 20, type: 'desk' }
];

const spawners = [
    { x: 100100, y: 300, w: 80, h: 40, label: "LIGHT", type: 'pistol' },
    { x: 100200, y: 300, w: 80, h: 40, label: "RIFLE", type: 'rifle' },
    { x: 100300, y: 300, w: 80, h: 40, label: "SHOTGUN", type: 'shotgun' },
    { x: 100400, y: 300, w: 80, h: 40, label: "GRENADE", type: 'grenadier' },
    { x: 100500, y: 300, w: 80, h: 40, label: "JUGGER-S", type: 'juggernaut_shotgun' },
    { x: 100600, y: 300, w: 80, h: 40, label: "JUGGER-R", type: 'juggernaut' },
    { x: 100100, y: 550, w: 100, h: 30, label: "GET SHOTGUN", isWeapon: 'shotgun' },
    { x: 100300, y: 550, w: 100, h: 30, label: "GET RIFLE", isWeapon: 'rifle' },
    { x: 100500, y: 550, w: 100, h: 30, label: "GET LAUNCHER", isWeapon: 'launcher' }
];

const player = { x: 100, y: 300, w: 32, h: 48, velY: 0, velX: 0, speed: 8, jumpForce: -16, jumps: 0, maxJumps: 2, hp: 100, maxHp: 100, onGround: false, dir: 1 };

platforms.push({ x: 0, y: 600, w: 2500, h: 50, type: 'floor' });

/**
 * TWORZENIE PRZECIWNIKA
 */
function createEnemy(x, y, startX, patrolRange, forcedType = null) {
    let type = forcedType || 'pistol';
    if (!forcedType) {
        let med = 0, hvy = 0;
        if (distance >= 6000) med = 1.0; else if (distance >= 3000) med = 0.3; else if (distance >= 1000) med = 0.05;
        if (distance >= 4000) hvy = 0.2 + (Math.floor((distance-4000)/1000)*0.1); else if (distance >= 1000) hvy = 0.03;
        const roll = Math.random();
        if (roll < hvy) type = Math.random() > 0.5 ? 'juggernaut' : 'juggernaut_shotgun';
        else if (roll < med) type = ['rifle', 'shotgun', 'grenadier'][Math.floor(Math.random()*3)];
    }

    const cnf = {
        pistol: { hp: 100, color: "#445544", gColor: "#222", burst: 1, dmg: 10, cd: 1800, spd: 5 },
        rifle: { hp: 80, color: "#224466", gColor: "#333", burst: 6, dmg: 8, cd: 2600, spd: 7 },
        shotgun: { hp: 200, color: "#662222", gColor: "#111", burst: 10, dmg: 5, cd: 2400, spd: 5 },
        grenadier: { hp: 250, color: "#556622", gColor: "#000", burst: 1, dmg: 50, cd: 3800, spd: 4 },
        juggernaut: { hp: 500, color: "#1a1a1a", gColor: "#222", burst: 6, dmg: 12, cd: 1500, spd: 6 },
        juggernaut_shotgun: { hp: 500, color: "#1a1a1a", gColor: "#ffd700", burst: 15, dmg: 6, cd: 2500, spd: 4.5 }
    };
    
    let c = cnf[type];
    return { x, y, w: 32, h: 48, hp: c.hp, maxHp: c.hp, type, color: c.color, gunColor: c.gColor, damage: c.dmg, burst: c.burst, cooldown: c.cd, bulletSpeed: c.spd, lastShot: 0, startX, patrolRange, velX: (type.includes('juggernaut') ? 1.2 : 2.2), dir: 1 };
}

function generateWorld() {
    if(inSecretRoom) return;
    while (lastGeneratedX < player.x + 3000) {
        platforms.push({ x: lastGeneratedX, y: 600, w: 1000, h: 50, type: 'floor' });
        if (Math.floor(lastGeneratedX / 10000) > shops.length) {
            shops.push({ 
                x: lastGeneratedX + 500, y: 250, w: 150, h: 20, 
                usedUpgrade: false, 
                offeredWeapon: ['shotgun', 'rifle', 'launcher'][Math.floor(Math.random()*3)],
                weaponBought: false 
            });
        }
        for(let j=0; j<6; j++) {
            let px = lastGeneratedX + Math.random() * 850, py = 200 + Math.random() * 300, pw = 180 + Math.random() * 120;
            platforms.push({ x: px, y: py, w: pw, h: 20, type: 'desk' });
            if (Math.random() > 0.4) enemies.push(createEnemy(px + 20, py - 50, px + 20, pw - 40));
        }
        lastGeneratedX += 1000;
    }
}

window.addEventListener("keydown", e => {
    if (e.code === "Backslash") toggleSecretRoom();
    if (e.code === "KeyP") togglePause();
    if (isPaused) return;
    if (e.code === "Space" && player.jumps < player.maxJumps && !activeShop) { player.velY = player.jumpForce; player.jumps++; player.onGround = false; }
    if (e.code === "KeyS" && player.onGround) { player.y += 30; player.onGround = false; }
    if (e.code === "KeyE") toggleShop();
    if (e.code === "Escape") closeShop();
    keys[e.code] = true;
});
window.addEventListener("keyup", e => keys[e.code] = false);

function toggleSecretRoom() {
    inSecretRoom = !inSecretRoom;
    if (inSecretRoom) { savedX = player.x; savedY = player.y; player.x = 100500; player.y = 500; }
    else { player.x = savedX; player.y = savedY; }
}

function reload() {
    if (isReloading || currentWeapon.ammo === Infinity) return;
    isReloading = true;
    updateUI();
    setTimeout(() => { currentAmmo = currentWeapon.ammo; isReloading = false; updateUI(); }, currentWeapon.reloadTime);
}

function togglePause() { isPaused = !isPaused; pauseMenu.style.display = isPaused ? "block" : "none"; }

function toggleShop() {
    let shop = shops.find(s => Math.abs(player.x - s.x) < 120 && Math.abs(player.y - s.y) < 150);
    if (shop) {
        activeShop = shop; shopMenu.style.display = "block";
        upgradeBtn.disabled = shop.usedUpgrade;
        weaponBuyBtn.disabled = shop.weaponBought;
        weaponBuyBtn.innerText = `BUY ${shop.offeredWeapon.toUpperCase()} ($750)`;
    }
}

function closeShop() { activeShop = null; shopMenu.style.display = "none"; }
function buyHealth() { if (money >= 100 && player.hp < player.maxHp) { money -= 100; player.hp = Math.min(player.maxHp, player.hp + 50); updateUI(); } }
function buyMaxHealth() { if (money >= 250 && activeShop && !activeShop.usedUpgrade) { money -= 250; player.maxHp += 25; player.hp += 25; activeShop.usedUpgrade = true; upgradeBtn.disabled = true; updateUI(); } }

function buyWeapon() {
    if (money >= 750 && activeShop && !activeShop.weaponBought) {
        money -= 750; currentWeapon = WEAPONS[activeShop.offeredWeapon];
        currentAmmo = currentWeapon.ammo; activeShop.weaponBought = true;
        weaponBuyBtn.disabled = true; updateUI();
    }
}

function updateUI() {
    hpBar.style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById("cashVal").innerText = `$${money}`;
    document.getElementById("distVal").innerText = `${distance}m`;
    document.getElementById("ammoUI").innerText = isReloading ? "RELOADING..." : `AMMO: ${currentAmmo === Infinity ? 'INF' : currentAmmo} / ${currentWeapon.ammo === Infinity ? 'INF' : currentWeapon.ammo}`;
    document.getElementById("weaponName").innerText = `EQUIPPED: ${currentWeapon.name}`;
}

canvas.addEventListener("mousedown", (e) => {
    if (player.hp <= 0 || activeShop || isPaused || isReloading) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + cameraX;
    const my = e.clientY - rect.top;

    if(inSecretRoom) {
        spawners.forEach(s => {
            if(mx > s.x && mx < s.x + s.w && my > s.y && my < s.y + s.h) {
                if(s.isWeapon) { currentWeapon = WEAPONS[s.isWeapon]; currentAmmo = currentWeapon.ammo; updateUI(); }
                else enemies.push(createEnemy(100500, 500, 100400, 200, s.type));
            }
        });
    }
});

function shoot() {
    const now = Date.now();
    if (now - lastShotTime < currentWeapon.fireRate) return;
    if (currentAmmo <= 0 && currentWeapon.ammo !== Infinity) { reload(); return; }

    const rect = canvas.getBoundingClientRect();
    const angle = Math.atan2((mouseY - rect.top) - (player.y + 20), (mouseX - rect.left) - (player.x - cameraX + 16));

    for (let i = 0; i < currentWeapon.count; i++) {
        const spread = (Math.random() - 0.5) * currentWeapon.spread;
        bullets.push({ 
            x: player.x + 16, y: player.y + 20, 
            vx: Math.cos(angle + spread) * 20, vy: Math.sin(angle + spread) * 20, 
            dmg: currentWeapon.damage,
            type: currentWeapon.type 
        });
    }

    if(currentWeapon.ammo !== Infinity) currentAmmo--;
    lastShotTime = now;
    updateUI();
}

let mouseX = 0, mouseY = 0, mouseDown = false;
window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener("mousedown", () => mouseDown = true);
window.addEventListener("mouseup", () => mouseDown = false);

function update() {
    if (player.hp <= 0 || activeShop || isPaused) return;
    if (mouseDown && !isReloading) shoot();

    if (keys["KeyA"]) { player.velX = -player.speed; player.dir = -1; }
    else if (keys["KeyD"]) { player.velX = player.speed; player.dir = 1; }
    else player.velX *= friction;

    player.velY += gravity;
    player.x += player.velX; player.y += player.velY;
    if(!inSecretRoom) distance = Math.max(distance, Math.floor(player.x / 10));
    updateUI();

    player.onGround = false;
    let currentPlats = inSecretRoom ? secretPlatforms : platforms;
    let allColl = [...currentPlats, ...shops];
    for (let p of allColl) {
        if (player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.velY) {
            if (keys["KeyS"] && p.type !== 'floor') continue;
            player.y = p.y - player.h; player.velY = 0; player.onGround = true; player.jumps = 0;
        }
    }

    cameraX = player.x - canvas.width / 3;
    if(!inSecretRoom) generateWorld();

    bullets.forEach((b, bi) => {
        b.x += b.vx; b.y += b.vy;
        
        if(b.type === 'grenade') {
            enemies.forEach((en) => {
                if(Math.hypot(b.x - (en.x+16), b.y - (en.y+24)) < 20) {
                   explosions.push({ x: b.x, y: b.y, r: 120, timer: 15, playerOwned: true, dmg: b.dmg });
                   bullets.splice(bi, 1);
                }
            });
            if(b.y > 595) {
                explosions.push({ x: b.x, y: b.y, r: 120, timer: 15, playerOwned: true, dmg: b.dmg });
                bullets.splice(bi, 1);
            }
        } else {
            enemies.forEach((en, ei) => {
                if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                    en.hp -= b.dmg; bullets.splice(bi, 1);
                    if (en.hp <= 0) {
                        let lootValue = 30; // domyślnie lekki
                        if (en.type.includes('juggernaut')) lootValue = 200;
                        else if (en.type === 'rifle' || en.type === 'shotgun' || en.type === 'grenadier') lootValue = 70;
                        
                        // Generowanie monet (każda moneta to $10, więc dzielimy wartość przez 10)
                        let count = lootValue / 10;
                        for(let k=0; k<count; k++) coins.push({ x: en.x + 16, y: en.y, vx: (Math.random()-0.5)*10, vy: -6, settled: false });
                        enemies.splice(ei, 1);
                    }
                }
            });
        }
    });

    enemies.forEach(en => {
        en.x += en.velX;
        if (en.x > en.startX + en.patrolRange || en.x < en.startX) { en.velX *= -1; en.dir *= -1; }
        if (Math.abs(player.x - en.x) < 800) {
            const now = Date.now();
            if (now - en.lastShot > en.cooldown) {
                const angle = Math.atan2(player.y + 20 - (en.y + 20), player.x - en.x);
                if (en.type === 'grenadier') enemyBullets.push({ x: en.x + 16, y: en.y + 20, vx: Math.cos(angle)*7, vy: Math.sin(angle)*7, type: 'grenade' });
                else if (en.type === 'rifle' || en.type === 'juggernaut') {
                    for(let i=0; i<en.burst; i++) setTimeout(() => { if (!isPaused) enemyBullets.push({ x: en.x + 16, y: en.y + 20, vx: Math.cos(angle)*en.bulletSpeed, vy: Math.sin(angle)*en.bulletSpeed, dmg: en.damage }); }, i * 120);
                } else if (en.type === 'shotgun' || en.type === 'juggernaut_shotgun') {
                    for(let i=0; i<en.burst; i++) { let spread = (Math.random()-0.5)*0.5; enemyBullets.push({ x: en.x + 16, y: en.y + 20, vx: Math.cos(angle+spread)*en.bulletSpeed, vy: Math.sin(angle+spread)*en.bulletSpeed, dmg: en.damage }); }
                } else enemyBullets.push({ x: en.x + 16, y: en.y + 20, vx: Math.cos(angle)*en.bulletSpeed, vy: Math.sin(angle)*en.bulletSpeed, dmg: en.damage });
                en.lastShot = now;
            }
        }
    });

    enemyBullets.forEach((eb, ebi) => {
        eb.x += eb.vx; eb.y += eb.vy;
        if (eb.type === 'grenade') {
            if (Math.hypot(player.x + 16 - eb.x, player.y + 24 - eb.y) < 35 || eb.y > 590) { explosions.push({ x: eb.x, y: eb.y, r: 100, timer: 15 }); enemyBullets.splice(ebi, 1); }
        } else if (eb.x > player.x && eb.x < player.x + player.w && eb.y > player.y && eb.y < player.y + player.h) {
            player.hp -= eb.dmg || 10; enemyBullets.splice(ebi, 1);
        }
    });

    explosions.forEach((ex, i) => { 
        ex.timer--; 
        if (ex.timer <= 0) explosions.splice(i, 1); 
        if (ex.timer === 14) {
            if(ex.playerOwned) {
                enemies.forEach((en, ei) => {
                    if(Math.hypot(en.x+16-ex.x, en.y+24-ex.y) < ex.r) {
                        en.hp -= ex.dmg;
                        if(en.hp <= 0) {
                           let lootValue = 30;
                           if (en.type.includes('juggernaut')) lootValue = 200;
                           else if (en.type === 'rifle' || en.type === 'shotgun' || en.type === 'grenadier') lootValue = 70;
                           let count = lootValue / 10;
                           for(let k=0; k<count; k++) coins.push({ x: en.x + 16, y: en.y, vx: (Math.random()-0.5)*10, vy: -6, settled: false });
                           enemies.splice(ei, 1);
                        }
                    }
                });
            } else {
                if (Math.hypot(player.x+16-ex.x, player.y+24-ex.y) < ex.r) player.hp -= 50; 
            }
        }
    });
    
    coins.forEach((c, index) => {
        if (!c.settled) { c.vy += 0.5; c.y += c.vy; c.x += c.vx; for (let p of currentPlats) { if (c.x > p.x && c.x < p.x + p.w && c.y > p.y - 10 && c.y < p.y + p.h) { c.y = p.y - 8; c.settled = true; c.vy = 0; c.vx = 0; break; } } }
        if (Math.abs(player.x - c.x) < 40 && Math.abs(player.y - c.y) < 60) { money += 10; coins.splice(index, 1); }
    });
}

function draw() {
    ctx.fillStyle = inSecretRoom ? "#050510" : "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-cameraX, 0);

    let currentPlats = inSecretRoom ? secretPlatforms : platforms;
    currentPlats.forEach(p => {
        if(p.type === 'floor') { ctx.fillStyle = "#000"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h); }
        else { ctx.fillStyle = "#3d2b1f"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#2a1d15"; ctx.fillRect(p.x, p.y, p.w, 4); }
    });

    shops.forEach(s => {
        ctx.fillStyle = "#ffd700"; ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText("BLACK MARKET [E]", s.x + s.w/2, s.y - 15);
        ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700"; ctx.strokeRect(s.x, s.y, s.w, s.h); ctx.shadowBlur = 0;
    });

    if(inSecretRoom) {
        spawners.forEach(s => {
            ctx.fillStyle = s.isWeapon ? "#ffd700" : "#00ff88"; ctx.fillRect(s.x, s.y, s.w, s.h);
            ctx.fillStyle = "#000"; ctx.font = "bold 11px Arial"; ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2 + 5);
        });
    }

    const drawChar = (char, color, isEnemy) => {
        let isH = char.type && char.type.includes('juggernaut'), sm = isH ? 1.4 : 1.0;
        ctx.fillStyle = color; ctx.fillRect(char.x + 4, char.y + 12 - (isH?10:0), 24*sm, 28*sm + (isH?10:0));
        ctx.fillStyle = "#ffdbac"; ctx.fillRect(char.x + 8, char.y - (isH?10:0), 16*sm, 16*sm);
        ctx.fillStyle = isEnemy ? char.gunColor : "#222";
        let gx = char.dir > 0 ? char.x + 22*sm : char.x - 14*sm;
        ctx.fillRect(gx, char.y + 22*sm, 24*sm, 8*sm);
        ctx.fillStyle = "#000"; ctx.fillRect(char.x, char.y - 30, 32*sm, 7);
        ctx.fillStyle = isEnemy ? (isH ? "#ff00ff" : "#ff3300") : "#00ff88"; ctx.fillRect(char.x, char.y - 30, (32*sm)*(char.hp/char.maxHp), 7);
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.fillText(Math.ceil(char.hp), char.x + 16*sm, char.y - 35);
    };

    drawChar(player, "#0066ff", false);
    enemies.forEach(en => drawChar(en, en.color, true));
    
    bullets.forEach(b => {
        if(b.type === 'grenade') { ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill(); }
        else { ctx.fillStyle = "#00ffff"; ctx.fillRect(b.x, b.y, 15, 5); }
    });

    enemyBullets.forEach(b => { if (b.type === 'grenade') { ctx.fillStyle = "#ff4400"; ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI*2); ctx.fill(); } else { ctx.fillStyle = "#ffaa00"; ctx.fillRect(b.x, b.y, 10, 5); } });
    explosions.forEach(ex => { ctx.fillStyle = `rgba(255, 100, 0, 0.7)`; ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.fill(); });
    coins.forEach(c => { ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.arc(c.x, c.y, 7, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = "#b8860b"; ctx.stroke(); });

    ctx.restore();
    if (player.hp <= 0) { ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "red"; ctx.font = "bold 80px Arial"; ctx.textAlign = "center"; ctx.fillText("WASTED", canvas.width/2, canvas.height/2); }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
